<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlindMaster App — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #3B82F6;
      --accent-rgb: 59, 130, 246;
      --bg: #0A0B0F;
      --bg-card: #181B24;
      --text: #F1F5F9;
      --text-muted: #8892A4;
      --text-faint: #4B5563;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(var(--accent-rgb), 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    .logo-icon {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 22px;
    }

    .logo-slat {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.12);
      border: 1px solid rgba(var(--accent-rgb), 0.25);
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    .badge-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 72%;
      background: linear-gradient(90deg, var(--accent), rgba(var(--accent-rgb), 0.4));
      border-radius: 100px;
      animation: shimmer 2s infinite;
      background-size: 200% 100%;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .progress-label {
      font-size: 0.68rem;
      color: var(--text-faint);
      text-align: right;
      margin-bottom: 40px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--text); }

    .back-link svg { transition: transform 0.2s; }
    .back-link:hover svg { transform: translateX(-3px); }

    @media (max-width: 520px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <div class="logo-slat"></div>
        <div class="logo-slat"></div>
        <div class="logo-slat"></div>
        <div class="logo-slat"></div>
      </div>
      BlindMaster
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      In Development
    </div>

    <h1>The web app is<br /><span>coming soon.</span></h1>

    <p>
      We're building the BlindMaster web experience so you can control
      your blinds from any browser — no install required. Stay tuned.
    </p>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <div class="progress-label">Development in progress</div>

    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to homepage
    </a>
  </div>

  <script>
    // Match time-based accent color from main landing page
    const hour = new Date().getHours();
    let accent, accentRgb;
    if (hour >= 5 && hour < 10) {
      accent = '#F97316'; accentRgb = '249, 115, 22';
    } else if (hour >= 10 && hour < 18) {
      accent = '#3B82F6'; accentRgb = '59, 130, 246';
    } else {
      accent = '#7C3AED'; accentRgb = '124, 58, 237';
    }
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--accent-rgb', accentRgb);
    // Update slats to match accent
    document.querySelectorAll('.logo-slat').forEach(s => s.style.background = accent);
  </script>
</body>
</html>
